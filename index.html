<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shakon TV Lite</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  color: white;
}

header {
  background: #111;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #333;
}

#search {
  width: 92%;
  margin: 10px auto;
  display: block;
  padding: 10px;
  border-radius: 5px;
  border: 1px solid #444;
  background: #111;
  color: white;
  outline: none;
}

video {
  width: 100%;
  max-height: 230px;
  background: black;
  display: block;
}

#channels {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 2 tadan kanal chiqadi */
  gap: 8px;
  padding: 10px;
}

.channel {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 6px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #333;
  font-size: 14px;
  /* Animatsiyalar olib tashlandi */
}

.channel:active {
  background: #444; /* Faqat bosilganda rang o'zgaradi */
}

.loading {
  text-align: center;
  padding: 10px;
  font-size: 13px;
  color: #888;
}
</style>
</head>

<body>

<header>📺 SHAKON TV</header>

<video id="player" controls autoplay muted playsinline></video>

<input type="text" id="search" placeholder="Kanal qidirish...">

<div id="loading" class="loading">Yuklanmoqda...</div>
<div id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const playlistURL = "https://raw.githubusercontent.com/Dimonovich/TV/Dimonovich/FREE/TV?m3u8";
let channels = [];
let video = document.getElementById("player");
let hls = null;

function play(url){
  if (hls) hls.destroy();
  video.muted = false;
  video.volume = 1.0;

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play();
      window.scrollTo(0,0);
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play();
  }
}

fetch(playlistURL)
.then(res => res.text())
.then(data => {
  let lines = data.split("\n");
  let currentName = "";

  lines.forEach(line => {
    line = line.trim();
    if(line.startsWith("#EXTINF")){
      let parts = line.split(",");
      currentName = parts[1] || "Kanal";
    }
    else if(line.startsWith("http")){
      if(line.includes(".m3u8") || line.includes(".mp4")){
        channels.push({ name: currentName, url: line });
      }
    }
  });

  document.getElementById("loading").style.display = "none";
  showChannels(channels);
});

function showChannels(list){
  let container = document.getElementById("channels");
  container.innerHTML = "";
  list.forEach(ch => {
    let div = document.createElement('div');
    div.className = 'channel';
    div.innerText = ch.name;
    div.onclick = () => play(ch.url);
    container.appendChild(div);
  });
}

document.getElementById('search').oninput = (e) => {
  let val = e.target.value.toLowerCase();
  showChannels(channels.filter(ch => ch.name.toLowerCase().includes(val)));
};
</script>

</body>
</html>
